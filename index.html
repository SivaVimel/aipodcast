<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>AI Podcast</title>
<meta property="og:title" content="Listen to this AI-generated podcast" />
<meta property="og:description" content="Open it in AI Podcast — hear it or read it on your phone." />
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(120% 90% at 50% 0%, #2a2160 0%, #0f0f0f 60%);
    color: #fff; display: flex; align-items: center; justify-content: center;
    padding: 24px; text-align: center;
  }
  .card { max-width: 420px; width: 100%; }
  .badge {
    font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
    color: #1db954; font-weight: 700; margin-bottom: 10px;
  }
  h1 { font-size: 26px; line-height: 1.25; margin: 0 0 14px; }
  p { color: #b3b3b3; font-size: 15px; line-height: 1.5; margin: 0 0 26px; }
  .btn {
    display: inline-block; width: 100%; padding: 16px 20px; border: 0;
    border-radius: 999px; font-size: 16px; font-weight: 700; cursor: pointer;
    text-decoration: none; margin-bottom: 12px;
  }
  .btn-primary { background: #1db954; color: #08120b; }
  .btn-ghost { background: rgba(255,255,255,0.10); color: #fff; }
  .spinner {
    width: 26px; height: 26px; margin: 0 auto 22px;
    border: 3px solid rgba(255,255,255,0.2); border-top-color: #1db954;
    border-radius: 50%; animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <div class="badge">AI Podcast</div>
    <h1 id="headline">Opening your podcast…</h1>
    <p id="sub">If nothing happens, choose an option below.</p>
    <a class="btn btn-primary" id="open" href="#">Open in the app</a>
    <a class="btn btn-ghost" id="store" href="#">Get AI Podcast on Google Play</a>
  </div>

<script>
(function () {
  // Keep these in sync with the Android app.
  var PACKAGE   = "com.svr.offlineaipodcast";
  var SCHEME    = "aipodcast";
  var HOST      = "share";
  var STORE_URL = "https://play.google.com/store/apps/details?id=" + PACKAGE +
                  "&referrer=utm_source%3Dshare";

  // The whole podcast (compressed + URL-safe base64) rides in the URL
  // fragment, which browsers never send to a server.
  var payload = (location.hash || "").replace(/^#/, "");

  var storeLink = document.getElementById("store");
  storeLink.href = STORE_URL;

  // No payload → this is just a plain visit; send them to the store.
  if (!payload) {
    document.getElementById("headline").textContent = "AI Podcast";
    document.getElementById("sub").textContent =
      "On-device AI podcasts you can hear or read.";
    document.getElementById("spinner").style.display = "none";
    document.getElementById("open").style.display = "none";
    location.replace(STORE_URL);
    return;
  }

  // intent:// URL: opens the installed app via the custom scheme, and —
  // crucially — Chrome auto-redirects to S.browser_fallback_url (the Play
  // Store) when the app is NOT installed. No domain verification needed.
  var intentUrl =
    "intent://" + HOST + "?d=" + encodeURIComponent(payload) +
    "#Intent;scheme=" + SCHEME + ";package=" + PACKAGE +
    ";S.browser_fallback_url=" + encodeURIComponent(STORE_URL) + ";end";

  // Non-Android (or non-Chrome) fallback: a plain custom-scheme URL for the
  // "Open in the app" button. The auto-redirect below uses the intent form.
  var schemeUrl = SCHEME + "://" + HOST + "?d=" + encodeURIComponent(payload);

  document.getElementById("open").href = intentUrl;

  var isAndroid = /android/i.test(navigator.userAgent);
  if (isAndroid) {
    // Fire automatically; the user can still tap the buttons if blocked.
    location.replace(intentUrl);
  } else {
    document.getElementById("open").href = schemeUrl;
    document.getElementById("headline").textContent = "Open in AI Podcast";
    document.getElementById("sub").textContent =
      "AI Podcast is an Android app. Open this link on your Android phone, " +
      "or install it from Google Play.";
    document.getElementById("spinner").style.display = "none";
  }
})();
</script>
</body>
</html>
